name: Deploy Backend to Linode

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Deploy to Linode Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Navigate to countrylab directory
            cd /var/www/countrylab

            # Check if backend directory exists, if not create it
            if [ ! -d "backend" ]; then
              echo "Creating backend directory..."
              mkdir -p backend
              cd backend
              git clone https://github.com/Tradely-LTD/countrylab_backend.git .
            else
              cd backend
            fi

            # Pull latest changes
            echo "Pulling latest changes..."
            git pull origin main || git clone https://github.com/Tradely-LTD/countrylab_backend.git .

            # Install dependencies
            echo "Installing dependencies..."
            npm install --production

            # Build application
            echo "Building application..."
            npm run build

            # Restart PM2 process
            echo "Restarting backend..."
            pm2 restart countrylab-backend || pm2 start dist/index.js --name countrylab-backend

            # Save PM2 configuration
            pm2 save

            echo "✅ Backend deployment completed successfully!"

      - name: Deployment Status
        if: success()
        run: echo "✅ Backend deployed successfully to Linode server!"

      - name: Deployment Failed
        if: failure()
        run: echo "❌ Backend deployment failed. Check logs for details."
